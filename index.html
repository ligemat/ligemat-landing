<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ligemat — Mohamed A. Osama | Real Estate Advisory</title>
<meta name="description" content="Property in Egypt, made clear. From the airport to your front door. Real estate advisory for expats and investors — Cairo & New Capital.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root[data-theme="dark"]{
    --bg:#0A0F0D;--bg-2:#0E1714;--panel:#121C18;--line:rgba(201,149,106,.16);
    --teal:#0F6E56;--teal-lt:#23C39A;--gold:#C9956A;--gold-lt:#E2B98C;
    --txt:#EDEFEC;--muted:#9BA8A2;--grad-a:#E2B98C;--grad-b:#23C39A;
    --shadow:rgba(0,0,0,.5);--glass:rgba(255,255,255,.04);--blob-blend:screen;--blob-op:.68;
  }
  :root[data-theme="light"]{
    --bg:#F6F3EC;--bg-2:#EFEBE1;--panel:#FFFFFF;--line:rgba(8,80,65,.14);
    --teal:#0F6E56;--teal-lt:#0F6E56;--gold:#B9844F;--gold-lt:#A9763F;
    --txt:#15201C;--muted:#5C6B64;--grad-a:#B9844F;--grad-b:#0F6E56;
    --shadow:rgba(8,80,65,.14);--glass:rgba(255,255,255,.5);--blob-blend:normal;--blob-op:.45;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:'Sora',system-ui,sans-serif;background:var(--bg);color:var(--txt);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background .4s,color .4s}
  :root[data-theme="dark"] body{background:linear-gradient(160deg,#0A0F0D 0%,#0D1613 45%,#0A1110 100%) fixed}
  :root[data-theme="light"] body{background:linear-gradient(160deg,#F6F1E4 0%,#E8F1EA 38%,#F7EDDC 72%,#EAF0E7 100%) fixed}
  .wrap{max-width:1160px;margin:0 auto;padding:0 32px;position:relative;z-index:2}
  a{text-decoration:none;color:inherit}

  /* ===== animated aurora background + cursor glow ===== */
  .aurora{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
  .blob{position:absolute;border-radius:50%;filter:blur(80px);mix-blend-mode:var(--blob-blend);opacity:var(--blob-op);transition:opacity .4s}
  .blob.b1{width:46vw;height:46vw;background:radial-gradient(circle,#1da882,transparent 65%);top:-12vw;left:-8vw;animation:drift1 20s ease-in-out infinite}
  .blob.b2{width:40vw;height:40vw;background:radial-gradient(circle,#caa06d,transparent 65%);top:4vw;right:-10vw;animation:drift2 24s ease-in-out infinite}
  .blob.b3{width:36vw;height:36vw;background:radial-gradient(circle,#0f6e56,transparent 65%);bottom:-14vw;left:26vw;animation:drift3 28s ease-in-out infinite}
  .blob.b4{width:30vw;height:30vw;background:radial-gradient(circle,#d8b27e,transparent 65%);bottom:-8vw;right:8vw;animation:drift2 26s ease-in-out infinite reverse}
  @keyframes drift1{50%{transform:translate(15vw,9vw) scale(1.15)}}
  @keyframes drift2{50%{transform:translate(-11vw,7vw) scale(1.1)}}
  @keyframes drift3{50%{transform:translate(7vw,-9vw) scale(1.2)}}
  .cursor-glow{position:fixed;width:480px;height:480px;border-radius:50%;background:radial-gradient(circle,rgba(35,195,154,.14),transparent 60%);transform:translate(-50%,-50%);pointer-events:none;z-index:1;mix-blend-mode:screen;opacity:0;transition:opacity .4s}
  :root[data-theme="light"] .cursor-glow{mix-blend-mode:normal;background:radial-gradient(circle,rgba(15,110,86,.10),transparent 60%)}
  @media(hover:hover){.cursor-glow{opacity:1}}

  nav{position:fixed;top:0;left:0;right:0;z-index:50;background:transparent;border-bottom:1px solid transparent;transition:background .35s,border-color .35s,box-shadow .35s}
  nav.scrolled{background:color-mix(in srgb,var(--bg) 55%,transparent);backdrop-filter:blur(14px);border-bottom-color:var(--line);box-shadow:0 10px 30px rgba(0,0,0,.15)}
  nav:not(.scrolled) .brand,nav:not(.scrolled) .nav-links a{color:rgba(255,255,255,.9);text-shadow:0 1px 14px rgba(0,0,0,.45)}
  nav:not(.scrolled) .nav-links a:hover{color:var(--gold-lt)}
  nav:not(.scrolled) .theme-toggle{color:#fff;border-color:rgba(255,255,255,.28);background:rgba(255,255,255,.08)}
  .nav-in{display:flex;align-items:center;justify-content:space-between;height:76px}
  .brand{font-size:22px;font-weight:700;display:flex;align-items:center;gap:11px}
  .brand i{width:32px;height:32px;border-radius:9px;background:linear-gradient(140deg,var(--gold),#a9763f);color:#1a1206;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;font-style:normal}
  .nav-right{display:flex;align-items:center;gap:18px}
  .nav-links{display:flex;gap:30px}
  .nav-links a{font-size:14px;color:var(--muted);transition:color .2s}
  .nav-links a:hover{color:var(--gold-lt)}
  .btn{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600;padding:12px 24px;border-radius:12px;transition:transform .15s,box-shadow .24s,border-color .24s,color .24s;cursor:pointer;border:none;will-change:transform}
  .btn-gold{background:linear-gradient(135deg,var(--gold),#b9844f);color:#1a1206;box-shadow:0 8px 28px rgba(201,149,106,.28)}
  .btn-line{background:var(--glass);border:1px solid var(--line);color:var(--txt);backdrop-filter:blur(8px)}
  .btn-line:hover{border-color:var(--gold);color:var(--gold-lt)}
  .theme-toggle{width:42px;height:42px;border-radius:11px;border:1px solid var(--line);background:var(--glass);color:var(--txt);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .24s}
  .theme-toggle:hover{border-color:var(--gold);color:var(--gold-lt)}
  .theme-toggle svg{width:19px;height:19px}
  :root[data-theme="light"] .i-moon{display:none}
  :root[data-theme="dark"] .i-sun{display:none}

  /* reveal on scroll (hide/show handled via inline styles in JS for reliability) */
  .reveal{transition:opacity .8s cubic-bezier(.2,.7,.2,1),transform .8s cubic-bezier(.2,.7,.2,1)}

  /* full-bleed luxury property hero */
  header{position:relative;min-height:100vh;min-height:100svh;display:flex;align-items:center;overflow:hidden;background:#06100d center/cover no-repeat;background-image:linear-gradient(150deg,#0f6e56,#06100d)}
  .hero-overlay{position:absolute;inset:0;z-index:1;background:linear-gradient(100deg,rgba(5,10,8,.94),rgba(5,10,8,.62) 46%,rgba(5,10,8,.24))}
  .hero-in{position:relative;z-index:2;width:100%;padding:120px 0 96px}
  .pill{display:inline-flex;align-items:center;gap:9px;font-size:13px;font-weight:500;color:#E2B98C;background:rgba(201,149,106,.14);border:1px solid var(--line);padding:8px 18px;border-radius:100px;margin-bottom:26px;backdrop-filter:blur(6px)}
  .pill .dot{width:7px;height:7px;border-radius:50%;background:#23C39A;box-shadow:0 0 12px #23C39A;animation:pulse 2.2s infinite}
  @keyframes pulse{50%{opacity:.4;transform:scale(.7)}}
  h1{font-size:64px;line-height:1.03;font-weight:800;letter-spacing:-.04em;color:#fff;max-width:720px;text-shadow:0 2px 30px rgba(0,0,0,.4)}
  h1 .grad{background:linear-gradient(110deg,#E2B98C,#23C39A);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;padding-right:.14em;margin-right:-.06em}
  h1 .sub-line{display:block;font-size:.42em;font-weight:500;color:rgba(255,255,255,.85);margin-top:16px;text-shadow:none}
  .lead{font-size:18px;font-weight:300;color:rgba(255,255,255,.84);max-width:480px;margin:24px 0 32px;line-height:1.7}
  .hero-cta{display:flex;gap:12px;flex-wrap:wrap}
  /* founder badge — big portrait card, right side */
  .founder-tag{position:absolute;z-index:3;right:clamp(24px,5vw,80px);top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:stretch;gap:0;background:rgba(5,10,8,.55);backdrop-filter:blur(12px);border:1px solid var(--line);padding:12px 12px 20px;border-radius:22px;width:312px;cursor:pointer;font-family:inherit;color:inherit;transition:border-color .25s,box-shadow .25s;animation:ftfade .9s ease .25s both}
  @keyframes ftfade{from{opacity:0}}
  .founder-tag:hover{border-color:rgba(226,185,140,.55);box-shadow:0 24px 60px rgba(0,0,0,.5)}
  .founder-tag img{width:288px;height:348px;object-fit:cover;object-position:center 15%;border-radius:16px;display:block;background:linear-gradient(150deg,var(--teal),#0a3a2e)}
  .founder-tag .fb{width:288px;height:348px;border-radius:16px;display:flex;align-items:center;justify-content:center;background:linear-gradient(150deg,var(--teal),#0a3a2e);font-weight:800;font-size:40px;color:rgba(255,255,255,.5)}
  .founder-tag>div:last-child{padding:16px 8px 0;text-align:center}
  .founder-tag b{display:block;font-size:18px;font-weight:700;color:#fff}
  .founder-tag span{font-size:12px;color:#E2B98C}
  .founder-tag .ft-hint{display:block;font-size:11px;color:rgba(255,255,255,.55);margin-top:4px}
  @media(max-width:1200px){
    .founder-tag{width:248px;padding:10px 10px 16px}
    .founder-tag img,.founder-tag .fb{width:228px;height:266px}
    .founder-tag b{font-size:16px}
    h1{font-size:54px;max-width:540px}
    .lead{max-width:440px}
  }

  /* founder popup */
  .fmodal{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:24px}
  .fmodal.open{display:flex}
  .fmodal-bg{position:absolute;inset:0;background:rgba(4,8,6,.72);backdrop-filter:blur(8px)}
  .fmodal-card{position:relative;z-index:2;background:var(--panel);border:1px solid var(--line);border-radius:24px;max-width:780px;width:100%;display:grid;grid-template-columns:310px 1fr;overflow:hidden;box-shadow:0 40px 110px rgba(0,0,0,.55);animation:fmpop .35s cubic-bezier(.2,.7,.2,1) both}
  @keyframes fmpop{from{opacity:0;transform:translateY(22px) scale(.97)}}
  .fmodal-photo{background:linear-gradient(150deg,var(--teal),#0a3a2e);min-height:400px}
  .fmodal-photo img{width:100%;height:100%;object-fit:cover;object-position:center 15%;display:block}
  .fmodal-body{padding:38px 34px;display:flex;flex-direction:column;justify-content:center}
  .fmodal-body h3{font-size:28px;font-weight:800;letter-spacing:-.02em;margin:4px 0 2px}
  .fmodal-role{font-size:13px;color:var(--gold-lt);font-weight:600}
  .fmodal-body p{font-size:15px;color:var(--muted);font-weight:300;line-height:1.7;margin:16px 0 22px}
  .fmodal-rows{border-top:1px solid var(--line);padding-top:18px;margin-bottom:22px;display:grid;gap:9px}
  .fm-row{display:flex;justify-content:space-between;gap:14px;font-size:13px}
  .fm-row span{color:var(--muted)}
  .fm-row b{font-weight:600;color:var(--txt);text-align:right;word-break:break-word}
  .fmodal-cta{display:flex;gap:10px;flex-wrap:wrap}
  .fmodal-cta .btn{padding:11px 18px;font-size:13px}
  .fmodal-x{position:absolute;top:14px;right:14px;z-index:3;width:36px;height:36px;border-radius:10px;border:1px solid var(--line);background:var(--glass);color:var(--txt);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
  .fmodal-x:hover{border-color:var(--gold);color:var(--gold-lt)}

  .strip{border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:color-mix(in srgb,var(--bg-2) 35%,transparent);backdrop-filter:blur(8px)}
  .strip-in{display:grid;grid-template-columns:repeat(4,1fr)}
  .st{padding:38px 18px;text-align:center;border-right:1px solid var(--line);transition:background .3s}
  .st:last-child{border-right:none}
  .st:hover{background:color-mix(in srgb,var(--teal-lt) 6%,transparent)}
  .st b{font-size:40px;font-weight:800;letter-spacing:-.03em;background:linear-gradient(120deg,var(--grad-a),var(--grad-b));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;display:block}
  .st span{font-size:13px;color:var(--muted);margin-top:5px;display:block}

  section{padding:100px 0}
  .head{text-align:center;max-width:900px;margin:0 auto 58px}
  .head h2{white-space:nowrap}
  .kicker{font-size:12px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
  .head h2{font-size:46px;font-weight:800;letter-spacing:-.03em;line-height:1.08}
  .head p{font-size:18px;color:var(--muted);margin-top:16px;font-weight:300}

  .vals{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .val{background:var(--glass);border:1px solid var(--line);border-radius:18px;padding:34px 30px;backdrop-filter:blur(10px);transition:transform .3s,border-color .3s,box-shadow .3s;text-align:center}
  .val:hover{transform:translateY(-6px);border-color:color-mix(in srgb,var(--gold) 40%,transparent);box-shadow:0 22px 50px rgba(35,195,154,.08)}
  .val .ic{width:48px;height:48px;border-radius:13px;background:color-mix(in srgb,var(--teal-lt) 12%,transparent);border:1px solid color-mix(in srgb,var(--teal-lt) 28%,transparent);display:flex;align-items:center;justify-content:center;color:var(--teal-lt);font-size:21px;margin:0 auto 20px}
  .val h3{font-size:19px;font-weight:600;margin-bottom:10px}
  .val p{font-size:15px;color:var(--muted);font-weight:300;line-height:1.7}

  .loc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .loc{position:relative;height:240px;border-radius:18px;overflow:hidden;border:1px solid var(--line);display:flex;align-items:flex-end;padding:20px;background:linear-gradient(140deg,var(--teal),#0a3a2e);transition:transform .35s,box-shadow .35s}
  .loc:hover{transform:translateY(-6px);box-shadow:0 26px 50px rgba(0,0,0,.4)}
  .loc::before{content:"";position:absolute;inset:0;background-size:cover;background-position:center;background-image:var(--img);transition:transform .5s}
  .loc:hover::before{transform:scale(1.06)}
  .loc::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(6,12,10,.82),rgba(6,12,10,.12))}
  .loc-txt{position:relative;z-index:2}
  .loc-txt b{color:#fff;font-size:19px;font-weight:700;display:block}
  .loc-txt span{color:rgba(255,255,255,.78);font-size:13px}

  .devs{background:color-mix(in srgb,var(--bg-2) 35%,transparent);border-top:1px solid var(--line);border-bottom:1px solid var(--line);backdrop-filter:blur(6px)}
  .dev-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
  .dev{background:var(--glass);border:1px solid var(--line);border-radius:13px;padding:24px 10px;text-align:center;font-size:15px;font-weight:600;transition:all .24s;backdrop-filter:blur(8px)}
  .dev:hover{border-color:color-mix(in srgb,var(--gold) 45%,transparent);color:var(--gold-lt);transform:translateY(-3px)}
  .dev small{display:block;font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-top:6px;opacity:.85}

  .unit-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
  .unit{border:1px solid var(--line);border-radius:18px;overflow:hidden;background:var(--glass);backdrop-filter:blur(8px);transition:transform .3s,border-color .3s,box-shadow .3s;position:relative}
  .unit:hover{transform:translateY(-7px);border-color:color-mix(in srgb,var(--gold) 40%,transparent);box-shadow:0 26px 55px var(--shadow)}
  .unit-img{height:150px;position:relative;background:linear-gradient(140deg,var(--teal),#0a3a2e);background-size:cover;background-position:center;display:flex;align-items:flex-end;padding:14px}
  .unit-img.has-photo::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(6,12,10,.7),transparent 60%)}
  .unit-img .tag{position:absolute;top:13px;left:13px;z-index:2;font-size:11px;font-weight:600;background:rgba(201,149,106,.95);color:#1a1206;padding:5px 11px;border-radius:8px}
  .unit-img b{position:relative;z-index:2;color:#fff;font-size:18px;font-weight:700}
  .unit-offer{position:absolute;top:0;right:0;z-index:3;background:linear-gradient(135deg,#e24b4a,#a32d2d);color:#fff;font-size:11px;font-weight:600;padding:6px 12px;border-bottom-left-radius:12px;max-width:80%;text-align:right;line-height:1.3}
  .unit-body{padding:20px}
  .unit-dev{font-size:11px;font-weight:600;color:var(--gold);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
  .unit-price{font-size:24px;font-weight:800;letter-spacing:-.03em}
  .unit-price small{font-size:12px;font-weight:400;color:var(--muted)}
  .unit-meta{display:flex;gap:14px;margin-top:15px;padding-top:15px;border-top:1px solid var(--line)}
  .unit-meta div{font-size:12px;color:var(--muted);font-weight:300}
  .unit-meta div b{display:block;font-size:14px;font-weight:600;color:var(--txt)}
  .units-empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:40px;font-weight:300}

  .cta-sec{position:relative;overflow:hidden}
  .cta{position:relative;border:1px solid var(--line);border-radius:28px;padding:74px 40px;text-align:center;overflow:hidden;background:var(--glass);backdrop-filter:blur(12px)}
  .cta h2{font-size:48px;font-weight:800;letter-spacing:-.03em;line-height:1.07;max-width:680px;margin:0 auto}
  .cta p{font-size:18px;color:var(--muted);max-width:520px;margin:20px auto 34px;font-weight:300}
  .cta-rows{display:flex;gap:40px;justify-content:center;flex-wrap:wrap;margin-top:42px;padding-top:34px;border-top:1px solid var(--line)}
  .cr span{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
  .cr b{font-size:17px;font-weight:600;color:var(--gold-lt)}
  footer{padding:46px 0;border-top:1px solid var(--line);margin-top:56px}
  .foot{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
  .foot small{font-size:13px;color:var(--muted)}
  .foot a.borlink{color:var(--gold-lt);border-bottom:1px solid color-mix(in srgb,var(--gold) 40%,transparent)}

  @media(max-width:880px){
    .hero-grid{grid-template-columns:1fr;gap:40px}
    h1{font-size:44px}.head h2,.cta h2{font-size:32px}.head h2{white-space:normal}
    .strip-in{grid-template-columns:repeat(2,1fr)}
    .vals,.unit-grid,.loc-grid{grid-template-columns:1fr}
    .dev-grid{grid-template-columns:repeat(3,1fr)}
    .nav-links{display:none}
    .st{border-right:none;border-bottom:1px solid var(--line)}
    .hero-in{padding:110px 0 140px}
    .founder-tag{left:50%;right:auto;top:auto;bottom:22px;transform:translateX(-50%);flex-direction:row;align-items:center;width:max-content;max-width:calc(100vw - 40px);padding:12px 22px 12px 12px;gap:14px}
    .founder-tag:hover{transform:translateX(-50%)}
    .founder-tag img,.founder-tag .fb{width:56px;height:68px;border-radius:12px;font-size:inherit}
    .founder-tag>div:last-child{padding:0;text-align:left}
    .fmodal-card{grid-template-columns:1fr;max-height:90vh;overflow-y:auto}
    .fmodal-photo{min-height:0;height:300px}
  }
  @media(prefers-reduced-motion:reduce){.blob,.portrait-ring,.pill .dot{animation:none}}
</style>
</head>
<body>

<div class="aurora"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div><div class="blob b4"></div></div>
<div class="cursor-glow" id="glow"></div>

<nav>
  <div class="wrap nav-in">
    <span class="brand"><a href="admin.html" class="brand-mark" aria-label="Team login" style="display:inline-flex;text-decoration:none"><i>L</i></a><a href="#" style="color:inherit;text-decoration:none">Ligemat</a></span>
    <div class="nav-right">
      <div class="nav-links">
        <a href="#about">About</a><a href="#locations">Locations</a><a href="#developers">Developers</a><a href="#units">Units</a><a href="#contact">Contact</a>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle day and night mode">
        <svg class="i-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="i-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </button>
      <a class="btn btn-gold magnetic" href="#contact">Book a call</a>
    </div>
  </div>
</nav>

<header id="heroSec">
  <div class="hero-overlay"></div>
  <div class="wrap hero-in">
    <div class="reveal" style="max-width:720px">
      <div class="pill"><span class="dot"></span> <span data-c="hero.eyebrow"></span></div>
      <h1><span data-c="hero.headline_pre"></span> <span class="grad" data-c="hero.headline_accent"></span>.
        <span class="sub-line" data-c="hero.subline"></span></h1>
      <p class="lead" data-c="hero.lead"></p>
      <div class="hero-cta">
        <a class="btn btn-gold magnetic" id="ctaWhatsapp" data-c="hero.cta_whatsapp" href="#"></a>
        <a class="btn btn-line magnetic" id="ctaBor" href="#" target="_blank" rel="noopener"><span data-c="hero.cta_bor"></span> ↗</a>
      </div>
    </div>
  </div>
  <button class="founder-tag" id="founderTag" type="button" aria-haspopup="dialog" aria-label="Meet the founder">
    <div class="fb">MO</div>
    <img id="portraitImg" src="osama.jpg" alt="Mohamed A. Osama" style="display:none" onload="this.style.display='block';var f=this.previousElementSibling;if(f)f.style.display='none'" onerror="this.style.display='none'">
    <div><b data-c="hero.name"></b><span data-c="hero.role"></span><span class="ft-hint">Tap to meet me ↗</span></div>
  </button>
</header>

<!-- founder popup -->
<div class="fmodal" id="founderModal" role="dialog" aria-modal="true" aria-label="About the founder">
  <div class="fmodal-bg" id="founderModalBg"></div>
  <div class="fmodal-card">
    <button class="fmodal-x" id="founderModalX" aria-label="Close">✕</button>
    <div class="fmodal-photo"><img id="modalPortrait" src="osama.jpg" alt="Mohamed A. Osama"></div>
    <div class="fmodal-body">
      <div class="fmodal-role" data-c="hero.role"></div>
      <h3 data-c="hero.name"></h3>
      <p data-c="hero.lead"></p>
      <div class="fmodal-rows">
        <div class="fm-row"><span>WhatsApp / Phone</span><b data-c="contact.phone"></b></div>
        <div class="fm-row"><span>Email</span><b data-c="contact.email"></b></div>
        <div class="fm-row"><span>Instagram</span><b data-c="contact.instagram"></b></div>
        <div class="fm-row"><span>Based in</span><b data-c="contact.based"></b></div>
      </div>
      <div class="fmodal-cta">
        <a class="btn btn-gold" id="mWa" href="#">WhatsApp</a>
        <a class="btn btn-line" id="mCall" href="#">Call</a>
        <a class="btn btn-line" id="mMail" href="#">Email</a>
        <a class="btn btn-line" id="mIg" href="#" target="_blank" rel="noopener">Instagram</a>
      </div>
    </div>
  </div>
</div>

<div class="strip"><div class="wrap"><div class="strip-in reveal" id="statStrip"></div></div></div>

<section id="about"><div class="wrap">
  <div class="head reveal"><div class="kicker" data-c="about.kicker"></div><h2 data-c="about.title"></h2>
    <p data-c="about.subtitle"></p></div>
  <div class="vals reveal" id="aboutCards"></div>
</div></section>

<section id="locations" style="padding-top:0"><div class="wrap">
  <div class="head reveal"><div class="kicker" data-c="locations.kicker"></div><h2 data-c="locations.title"></h2>
    <p data-c="locations.subtitle"></p></div>
  <div class="loc-grid reveal" id="locGrid"></div>
</div></section>

<section id="developers" class="devs"><div class="wrap">
  <div class="head reveal"><div class="kicker" data-c="developers.kicker"></div><h2 data-c="developers.title"></h2></div>
  <div class="dev-grid reveal" id="devGrid"></div>
</div></section>

<section id="units"><div class="wrap">
  <div class="head reveal"><div class="kicker" data-c="units_head.kicker"></div><h2 data-c="units_head.title"></h2>
    <p data-c="units_head.subtitle"></p></div>
  <div class="unit-grid reveal" id="unitGrid"><div class="units-empty">Loading units…</div></div>
</div></section>

<section id="contact" class="cta-sec"><div class="wrap">
  <div class="cta reveal">
    <div class="cta-in">
      <h2 data-c="contact.title"></h2>
      <p data-c="contact.subtitle"></p>
      <div class="hero-cta" style="justify-content:center">
        <a class="btn btn-gold magnetic" id="ctaWhatsapp2" data-c="contact.cta_whatsapp" href="#"></a>
        <a class="btn btn-line magnetic" id="ctaPhone" data-c="contact.cta_phone" href="#"></a>
      </div>
      <div class="cta-rows">
        <div class="cr"><span>WhatsApp / Phone</span><b data-c="contact.phone"></b></div>
        <div class="cr"><span>Email</span><b data-c="contact.email"></b></div>
        <div class="cr"><span>Instagram</span><b><a id="igLink" href="#" target="_blank" rel="noopener" data-c="contact.instagram"></a></b></div>
        <div class="cr"><span>Based in</span><b data-c="contact.based"></b></div>
      </div>
    </div>
  </div>
</div></section>

<footer><div class="wrap foot">
  <span class="brand"><i>L</i>Ligemat</span>
  <small>© 2026 Ligemat · <a class="borlink" id="footIg" href="#" target="_blank" rel="noopener" data-c="contact.instagram"></a> · A <a class="borlink" id="footBor" href="#" target="_blank" rel="noopener">Bank of Real Estate</a> brand</small>
</div></footer>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="content-defaults.js"></script>
<script>
(function(){
  var C = window.LIGEMAT_CONFIG || {};
  var DEF = window.LIGEMAT_DEFAULTS;

  var r=document.documentElement,s=null;try{s=localStorage.getItem('ligemat-theme')}catch(e){}
  if(!s)s=(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark';
  r.setAttribute('data-theme',s);
  document.getElementById('themeToggle').addEventListener('click',function(){
    var n=r.getAttribute('data-theme')==='dark'?'light':'dark';r.setAttribute('data-theme',n);
    try{localStorage.setItem('ligemat-theme',n)}catch(e){}});

  function esc(t){return (t==null?'':String(t)).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function get(o,path){return path.split('.').reduce(function(a,k){return a==null?null:a[k];},o);}

  function renderContent(c){
    document.querySelectorAll('[data-c]').forEach(function(el){
      var v=get(c, el.getAttribute('data-c'));
      if(v!=null) el.textContent=v;
    });
    var contact=c.contact||{};
    var wa='https://wa.me/'+(contact.whatsapp||C.WHATSAPP||'201507785755');
    ['ctaWhatsapp','ctaWhatsapp2','mWa'].forEach(function(id){var e=document.getElementById(id);if(e)e.href=wa;});
    var ph=(contact.phone||'').replace(/\s/g,'');
    ['ctaPhone','mCall'].forEach(function(id){var e=document.getElementById(id);if(e)e.href='tel:'+ph;});
    var me=document.getElementById('mMail'); if(me)me.href='mailto:'+(contact.email||'');
    var bor=contact.bor_url||C.BOR_URL||'https://bank-re.com';
    ['ctaBor','footBor'].forEach(function(id){var e=document.getElementById(id);if(e)e.href=bor;});
    var ig=(contact.instagram||'').replace(/^@/,'').trim();
    var igUrl=ig?('https://instagram.com/'+ig):'#';
    ['igLink','footIg','mIg'].forEach(function(id){var e=document.getElementById(id);if(e)e.href=igUrl;});
    var hi=(c.hero&&c.hero.hero_image);
    var hs=document.getElementById('heroSec');
    if(hs&&hi){hs.style.backgroundImage="url('"+hi+"')";}

    document.getElementById('statStrip').innerHTML=(c.stats||[]).map(function(s){
      return '<div class="st"><b data-count>'+esc(s.value)+'</b><span>'+esc(s.label)+'</span></div>';
    }).join('');
    setupCount();
    document.getElementById('aboutCards').innerHTML=((c.about&&c.about.cards)||[]).map(function(v){
      return '<div class="val"><div class="ic">'+esc(v.icon)+'</div><h3>'+esc(v.title)+'</h3><p>'+esc(v.text)+'</p></div>';
    }).join('');
    document.getElementById('locGrid').innerHTML=((c.locations&&c.locations.items)||[]).map(function(l){
      return '<div class="loc" style="--img:url(\''+esc(l.image)+'\')"><div class="loc-txt"><b>'+esc(l.title)+'</b><span>'+esc(l.sub)+'</span></div></div>';
    }).join('');
    document.getElementById('devGrid').innerHTML=((c.developers&&c.developers.items)||[]).map(function(d){
      return '<div class="dev">'+esc(d.name)+(d.tier?'<small>'+esc(d.tier)+'</small>':'')+'</div>';
    }).join('');
  }

  function renderUnits(units){
    var grid=document.getElementById('unitGrid');
    if(!units||!units.length){grid.innerHTML='<div class="units-empty">No units to show yet.</div>';return;}
    grid.innerHTML=units.map(function(u){
      var hasPhoto=u.image_url&&u.image_url.trim();
      var bg=hasPhoto?"background-image:linear-gradient(to top,rgba(6,12,10,.7),transparent 60%),url('"+esc(u.image_url)+"')":"";
      var offer=u.is_offer?('<div class="unit-offer">'+esc(u.offer_text||'Special offer')+'</div>'):'';
      return '<div class="unit">'+offer+
        '<div class="unit-img '+(hasPhoto?'has-photo':'')+'" style="'+bg+'">'+
          (u.tag?'<span class="tag">'+esc(u.tag)+'</span>':'')+'<b>'+esc(u.name)+'</b></div>'+
        '<div class="unit-body">'+(u.developer?'<div class="unit-dev">'+esc(u.developer)+'</div>':'')+
          '<div class="unit-price">'+esc(u.price)+(u.price_per_m?' <small>· '+esc(u.price_per_m)+'</small>':'')+'</div>'+
          '<div class="unit-meta"><div>Area<b>'+esc(u.area||'—')+'</b></div><div>Beds<b>'+esc(u.beds||'—')+'</b></div><div>Delivery<b>'+esc(u.delivery||'—')+'</b></div></div>'+
        '</div></div>';
    }).join('');
  }

  // ===== count-up for stat numbers =====
  var countObserver=null, countDone=false;
  function setupCount(){
    var strip=document.getElementById('statStrip');
    if(!countObserver){
      countObserver=new IntersectionObserver(function(es){
        es.forEach(function(en){ if(en.isIntersecting && !countDone){ countDone=true; runCount(); } });
      },{threshold:.4});
      countObserver.observe(strip);
    }
    // if already visible (e.g. short pages), run now
    var r=strip.getBoundingClientRect();
    if(!countDone && r.top<window.innerHeight && r.bottom>0){countDone=true;runCount();}
  }
  function runCount(){
    document.querySelectorAll('#statStrip b[data-count]').forEach(function(b){
      var m=b.textContent.match(/^(\D*)(\d[\d.,]*)(\D*)$/);
      if(!m){return;}
      var pre=m[1], target=parseFloat(m[2].replace(/,/g,'')), suf=m[3];
      var start=performance.now(), dur=1500;
      function tick(now){
        var p=Math.min((now-start)/dur,1), e=1-Math.pow(1-p,3);
        b.textContent=pre+Math.round(target*e)+suf;
        if(p<1)requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    });
  }

  // ===== interactions =====
  // nav: transparent over hero, solid after scrolling
  var navEl=document.querySelector('nav');
  function navScroll(){navEl.classList.toggle('scrolled',window.scrollY>30);}
  window.addEventListener('scroll',navScroll,{passive:true});navScroll();
  // founder popup
  var fModal=document.getElementById('founderModal');
  function fOpen(){fModal.classList.add('open');document.body.style.overflow='hidden';}
  function fClose(){fModal.classList.remove('open');document.body.style.overflow='';}
  document.getElementById('founderTag').addEventListener('click',fOpen);
  document.getElementById('founderModalBg').addEventListener('click',fClose);
  document.getElementById('founderModalX').addEventListener('click',fClose);
  document.addEventListener('keydown',function(e){if(e.key==='Escape')fClose();});
  // cursor glow
  var glow=document.getElementById('glow');
  if(window.matchMedia('(hover:hover)').matches){
    window.addEventListener('mousemove',function(e){glow.style.left=e.clientX+'px';glow.style.top=e.clientY+'px';});
  }
  // portrait 3D tilt
  var pw=document.getElementById('portraitWrap'), pt=document.getElementById('portraitTilt');
  if(pw&&pt){
    pw.addEventListener('mousemove',function(e){var rc=pw.getBoundingClientRect();var x=(e.clientX-rc.left)/rc.width-.5,y=(e.clientY-rc.top)/rc.height-.5;pt.style.transform='rotateY('+(x*11)+'deg) rotateX('+(-y*11)+'deg)';});
    pw.addEventListener('mouseleave',function(){pt.style.transform='rotateY(0) rotateX(0)';});
  }
  // magnetic buttons
  document.querySelectorAll('.magnetic').forEach(function(b){
    b.addEventListener('mousemove',function(e){var rc=b.getBoundingClientRect();b.style.transform='translate('+((e.clientX-rc.left-rc.width/2)*.22)+'px,'+((e.clientY-rc.top-rc.height/2)*.35)+'px)';});
    b.addEventListener('mouseleave',function(){b.style.transform='translate(0,0)';});
  });
  // scroll reveal — hide + show via INLINE styles (reliable; content stays visible if JS fails)
  var reveals=document.querySelectorAll('.reveal');
  var reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  if(!reduce){reveals.forEach(function(el){el.style.opacity='0';el.style.transform='translateY(28px)';});}
  var revObs=new IntersectionObserver(function(es){es.forEach(function(en){if(en.isIntersecting){en.target.style.opacity='1';en.target.style.transform='none';revObs.unobserve(en.target);}});},{threshold:.12});
  reveals.forEach(function(el){revObs.observe(el);});
  // safety net: ensure everything is visible after 1.6s no matter what
  setTimeout(function(){reveals.forEach(function(el){el.style.opacity='1';el.style.transform='none';});},1600);

  // ===== data =====
  renderContent(DEF);
  renderUnits(DEF.units_demo);

  var configured=C.SUPABASE_URL&&C.SUPABASE_URL.indexOf('http')===0&&C.SUPABASE_ANON_KEY&&C.SUPABASE_ANON_KEY.indexOf('PASTE')!==0;
  if(configured&&window.supabase){
    var sb=window.supabase.createClient(C.SUPABASE_URL,C.SUPABASE_ANON_KEY);
    sb.from('ligemat_settings').select('content,portrait_url').eq('id',1).single().then(function(res){
      if(res&&res.data){
        if(res.data.content) renderContent(res.data.content);
        if(res.data.portrait_url){
          var im=document.getElementById('portraitImg');if(im){im.style.display='block';im.src=res.data.portrait_url;}
          var im2=document.getElementById('modalPortrait');if(im2){im2.src=res.data.portrait_url;}
        }
      }
    });
    sb.from('ligemat_units').select('*').eq('visible',true).order('sort_order',{ascending:true}).then(function(res){
      if(res&&!res.error&&res.data) renderUnits(res.data);
    });
  }
})();
</script>
</body>
</html>
