<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T3 — Gold Sweep</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sora',sans-serif;background:#0A0F0D;color:#EDEFEC;-webkit-font-smoothing:antialiased;overflow:hidden;height:100svh}
.aurora{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.blob{position:absolute;border-radius:50%;filter:blur(80px);mix-blend-mode:screen;opacity:.68}
.b1{width:46vw;height:46vw;background:radial-gradient(circle,#1da882,transparent 65%);top:-12vw;left:-8vw;animation:d1 20s ease-in-out infinite}
.b2{width:40vw;height:40vw;background:radial-gradient(circle,#caa06d,transparent 65%);top:4vw;right:-10vw;animation:d2 24s ease-in-out infinite}
.b3{width:36vw;height:36vw;background:radial-gradient(circle,#0f6e56,transparent 65%);bottom:-14vw;left:26vw;animation:d3 28s ease-in-out infinite}
.b4{width:30vw;height:30vw;background:radial-gradient(circle,#d8b27e,transparent 65%);bottom:-8vw;right:8vw;animation:d2 26s ease-in-out infinite reverse}
@keyframes d1{50%{transform:translate(15vw,9vw) scale(1.15)}}
@keyframes d2{50%{transform:translate(-11vw,7vw) scale(1.1)}}
@keyframes d3{50%{transform:translate(7vw,-9vw) scale(1.2)}}

/* page */
header{position:relative;z-index:2;min-height:100svh;display:flex;align-items:center;padding:80px clamp(32px,8vw,120px)}
.hero-ov{position:absolute;inset:0;background:linear-gradient(110deg,rgba(5,10,8,.93) 0%,rgba(5,10,8,.5) 55%,transparent 100%)}
.hi{position:relative;max-width:700px}
.pill{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:#C9956A;border:1px solid rgba(201,149,106,.25);border-radius:20px;padding:5px 14px;margin-bottom:28px}
.dot{width:6px;height:6px;border-radius:50%;background:#23C39A;display:inline-block}
h1{font-size:clamp(40px,6vw,76px);line-height:1.08;font-weight:800;letter-spacing:-.04em;margin-bottom:18px}
.gc{background:linear-gradient(110deg,#E2B98C,#23C39A);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.lead{font-size:clamp(15px,1.4vw,18px);color:rgba(255,255,255,.55);line-height:1.65;margin-bottom:32px}
.btns{display:flex;gap:14px;flex-wrap:wrap}
.bg{display:inline-flex;padding:13px 28px;border-radius:100px;font-family:'Sora',sans-serif;font-size:14px;font-weight:600;background:linear-gradient(110deg,#C9956A,#a9763f);color:#1a1206;cursor:pointer;border:none}
.bl{display:inline-flex;padding:12px 28px;border-radius:100px;font-family:'Sora',sans-serif;font-size:14px;font-weight:600;border:1px solid rgba(201,149,106,.35);color:#EDEFEC;cursor:pointer;background:transparent}

/* ===== INTRO — venetian blinds / strip wipe ===== */
/* 10 horizontal strips collapse upward in a stagger, revealing the page strip by strip. */
#intro{position:fixed;inset:0;z-index:500;pointer-events:none;overflow:hidden}
#intro.gone{display:none}

.intro-logo{
  position:absolute;inset:0;z-index:20;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;
}
#intro.done .intro-logo{animation:ilogoOut .42s ease .18s forwards}
@keyframes ilogoOut{to{opacity:0;transform:scale(.88)}}

.intro-mark{position:relative;overflow:hidden;width:72px;height:72px;border-radius:20px;background:linear-gradient(140deg,#C9956A,#a9763f);color:#1a1206;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;font-style:normal;box-shadow:0 0 0 1px rgba(201,149,106,.3),0 24px 60px rgba(201,149,106,.22);opacity:0;animation:m1mark .7s cubic-bezier(.2,.85,.2,1) forwards}
@keyframes m1mark{0%{opacity:0;transform:scale(.5) rotate(-10deg)}60%{opacity:1;transform:scale(1.09) rotate(2deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
.intro-mark::after{content:"";position:absolute;inset:0;border-radius:inherit;background:linear-gradient(115deg,transparent 32%,rgba(255,255,255,.75) 50%,transparent 68%);transform:translateX(-130%);animation:m1shine 1s ease .55s forwards}
@keyframes m1shine{to{transform:translateX(130%)}}
.intro-word{font-size:26px;font-weight:700;letter-spacing:.06em;color:#EDEFEC}
.intro-word b{display:inline-block;font-weight:inherit;font-style:normal;opacity:0;transform:translateY(10px);animation:m1ltr .42s ease forwards;animation-delay:calc(.45s + var(--i)*.05s)}
@keyframes m1ltr{to{opacity:1;transform:none}}
.intro-bar{width:48px;height:2px;border-radius:2px;background:linear-gradient(90deg,#C9956A,#23C39A);opacity:0;animation:ibarIn .4s ease .95s forwards,ibarGrow .7s ease .95s forwards}
@keyframes ibarIn{to{opacity:.7}}
@keyframes ibarGrow{from{width:12px}to{width:48px}}

/* The blinds */
.blinds{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column}
.blind{
  flex:1;
  background:#0A0F0D;
  transform-origin:top center;
  transition:transform .52s cubic-bezier(.76,0,.24,1);
  /* transition-delay set inline per strip */
}
.blinds.open .blind{transform:scaleY(0)}

/* Gold leading edge: each blind has a shimmer line at its top edge that flashes before it collapses */
.blind::before{
  content:'';display:block;height:1px;
  background:linear-gradient(90deg,transparent 0%,rgba(201,149,106,.0) 20%,rgba(201,149,106,.7) 50%,rgba(35,195,154,.5) 70%,transparent 100%);
  opacity:0;
  transition:opacity .08s ease;
}
.blinds.open .blind::before{opacity:1}

.lbl{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:600;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.3);white-space:nowrap;font-family:'Sora',sans-serif}
</style>
</head>
<body>

<div class="aurora"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div><div class="blob b4"></div></div>

<header>
  <div class="hero-ov"></div>
  <div class="hi">
    <div class="pill"><span class="dot"></span>Real estate advisory · Cairo</div>
    <h1>Properties, made<br><span class="gc">clearer</span><span class="gc">.</span></h1>
    <p class="lead">From the airport to your front door.</p>
    <div class="btns"><button class="bg">WhatsApp Me</button><button class="bl">Bank of Real Estate ↗</button></div>
  </div>
</header>

<div id="intro" aria-hidden="true">
  <div class="blinds" id="blinds"></div>
  <div class="intro-logo">
    <i class="intro-mark">L</i>
    <span class="intro-word"><b style="--i:0">L</b><b style="--i:1">i</b><b style="--i:2">g</b><b style="--i:3">e</b><b style="--i:4">m</b><b style="--i:5">a</b><b style="--i:6">t</b></span>
    <div class="intro-bar"></div>
  </div>
</div>

<div class="lbl">T3 — Venetian Blinds · click to replay</div>

<script>
var N=10, STAGGER=42, DURATION=520;
var blindsEl=document.getElementById('blinds');

// build strips
for(var i=0;i<N;i++){
  var b=document.createElement('div');
  b.className='blind';
  b.style.transitionDelay=(i*STAGGER)+'ms';
  blindsEl.appendChild(b);
}

var intro=document.getElementById('intro'),done=false;
function dismiss(){
  if(done)return; done=true;
  intro.classList.add('done');
  blindsEl.classList.add('open');
  var total=N*STAGGER+DURATION;
  setTimeout(function(){intro.classList.add('gone');},total+100);
}
setTimeout(dismiss,1900);
document.addEventListener('click',function(){
  if(done){setTimeout(function(){location.reload();},100);}else{dismiss();}
});
setTimeout(function(){location.reload();},7500);
</script>
</body>
</html>
