<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Draft D — Scramble Decode</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sora',sans-serif;background:#0A0F0D;color:#EDEFEC;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;overflow:hidden}
.aurora{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.blob{position:absolute;border-radius:50%;filter:blur(80px);mix-blend-mode:screen;opacity:.68}
.b1{width:46vw;height:46vw;background:radial-gradient(circle,#1da882,transparent 65%);top:-12vw;left:-8vw;animation:d1 20s ease-in-out infinite}
.b2{width:40vw;height:40vw;background:radial-gradient(circle,#caa06d,transparent 65%);top:4vw;right:-10vw;animation:d2 24s ease-in-out infinite}
.b3{width:36vw;height:36vw;background:radial-gradient(circle,#0f6e56,transparent 65%);bottom:-14vw;left:26vw;animation:d3 28s ease-in-out infinite}
.b4{width:30vw;height:30vw;background:radial-gradient(circle,#d8b27e,transparent 65%);bottom:-8vw;right:8vw;animation:d2 26s ease-in-out infinite reverse}
@keyframes d1{50%{transform:translate(15vw,9vw) scale(1.15)}}
@keyframes d2{50%{transform:translate(-11vw,7vw) scale(1.1)}}
@keyframes d3{50%{transform:translate(7vw,-9vw) scale(1.2)}}
.stage{position:relative;z-index:2;padding:clamp(60px,10vw,120px) clamp(32px,8vw,120px)}
.badge{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#0A0F0D;background:linear-gradient(110deg,#C9956A,#23C39A);border-radius:20px;padding:5px 14px;margin-bottom:28px;opacity:.9}
h1{font-size:clamp(36px,5.5vw,72px);line-height:1.08;font-weight:800;letter-spacing:-.04em;white-space:nowrap}
.gc{background:linear-gradient(110deg,#E2B98C,#23C39A);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;display:inline-block}
.sub{font-size:clamp(14px,1.4vw,17px);font-weight:400;color:rgba(255,255,255,.55);margin-top:18px;line-height:1.6;opacity:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
[data-cur]::after{content:'';display:inline-block;width:3px;height:.78em;background:rgba(255,255,255,.8);border-radius:2px;margin-left:2px;vertical-align:-.1em;animation:blink .5s step-end infinite}
.label{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.3);letter-spacing:.12em;text-transform:uppercase;z-index:10;text-align:center}
</style>
</head>
<body>
<div class="aurora"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div><div class="blob b4"></div></div>

<div class="stage">
  <div class="badge">Draft D — Scramble · each char decodes before locking</div>
  <h1 id="hl"></h1>
  <p class="sub" id="sub"></p>
</div>
<div class="label">loops automatically · concept: scramble/decode — opposite of typewriter</div>

<script>
var WHITE = 'Properties, made ';
var GRAD  = 'clearer';
var SUB   = 'From the airport to your front door.';
var SPEED = 72;   // ms between char locks
var COMMA = 200;
var FLASHES = 5;  // random chars flashed before locking
var FSPEED = 18;  // ms per random flash

// Character pool for scramble — avoid very wide/narrow chars to reduce jitter
var POOL = 'ABCDEFGHIJKLMNPQRSTUVWXYZabcdefghijklmnpqrstuvwxyz';
function rnd(){ return POOL[Math.floor(Math.random()*POOL.length)]; }

var hl    = document.getElementById('hl');
var subEl = document.getElementById('sub');

// Pre-compute cumulative lock times for white text
function buildTimeline(text, speed, comma){
  var times = [], t = 0;
  for(var i=0;i<text.length;i++){
    times.push(t);
    t += speed;
    if(text[i]===','||text[i]===' ') t += comma;
  }
  return {times:times, total:t};
}

function run(){
  hl.innerHTML = '';
  subEl.innerHTML = '';
  subEl.style.opacity = '0';
  subEl.style.transition = '';

  // — build white spans (all start hidden) —
  var wLine = document.createElement('span');
  hl.appendChild(wLine);
  var whiteSpans = [];
  WHITE.split('').forEach(function(ch){
    var s = document.createElement('span');
    s.textContent = ch;
    s.style.opacity = '0';
    wLine.appendChild(s);
    whiteSpans.push({el:s, ch:ch});
  });

  // — line break + grad element —
  hl.appendChild(document.createElement('br'));
  var gradEl = document.createElement('span');
  gradEl.className = 'gc';
  hl.appendChild(gradEl);
  var dotEl = document.createElement('span');
  dotEl.className = 'gc';
  hl.appendChild(dotEl);

  // Measure grad width for stable layout
  gradEl.textContent = GRAD + '.';
  var gFullW = gradEl.getBoundingClientRect().width || 300;
  gradEl.textContent = '';
  gradEl.style.minWidth = gFullW + 'px';

  // White text timeline
  var wt = buildTimeline(WHITE, SPEED, COMMA);

  // Decode each char: flash N random chars then lock
  function decodeSpan(spanObj, lockAt, onDone){
    var el = spanObj.el, target = spanObj.ch;
    var flashStart = lockAt - FLASHES * FSPEED;

    function frame(ts){
      if(ts < flashStart){ requestAnimationFrame(frame); return; }
      var elapsed = ts - flashStart;
      var fi = Math.floor(elapsed / FSPEED);
      if(fi < FLASHES){
        el.style.opacity = (0.25 + fi * 0.12).toFixed(2);
        el.textContent = (target === ' ' || target === ' ') ? target : rnd();
        requestAnimationFrame(frame);
      } else {
        el.textContent = target;
        el.style.opacity = '1';
        el.removeAttribute('data-cur');
        if(onDone) onDone();
      }
    }
    requestAnimationFrame(frame);
  }

  var origin = null;
  function start(ts){
    if(!origin) origin = ts;

    // Kick off each white char decode
    whiteSpans.forEach(function(s, i){
      var lockAt = origin + wt.times[i] + FLASHES * FSPEED;
      decodeSpan(s, lockAt, null);
      // cursor follows the currently-active char
      var showCurAt = wt.times[i];
      (function(el, t){
        var shown = false;
        function chk(ts2){
          if(!shown && ts2 - origin >= t){ el.setAttribute('data-cur',''); shown = true; }
          else if(!shown) requestAnimationFrame(chk);
        }
        requestAnimationFrame(chk);
      })(s.el, showCurAt);
    });

    // Grad decode after white is done
    var gradStart = origin + wt.total + SPEED;
    var gradLen = GRAD.length;
    var gradLocked = 0;
    var gradDone = false;

    function gradTick(ts){
      if(ts < gradStart){ requestAnimationFrame(gradTick); return; }
      if(!gradDone && gradEl.textContent.length === 0) gradEl.textContent = GRAD[0];

      var elapsed = ts - gradStart;
      // How many chars should be locked
      var shouldLock = Math.min(gradLen, Math.floor(elapsed / SPEED) + 1);

      if(shouldLock > gradLocked){
        gradLocked = shouldLock;
        // Update gradEl text: locked part + scramble for unlocked
        var locked = GRAD.slice(0, gradLocked);
        var rest = '';
        for(var r = gradLocked; r < gradLen; r++) rest += rnd();
        gradEl.textContent = locked + rest;
      } else if(!gradDone){
        // Just scramble unlocked chars
        var locked2 = GRAD.slice(0, gradLocked);
        var rest2 = '';
        for(var r2 = gradLocked; r2 < gradLen; r2++) rest2 += rnd();
        gradEl.textContent = locked2 + rest2;
      }

      if(gradLocked < gradLen){
        requestAnimationFrame(gradTick);
      } else if(!gradDone){
        gradDone = true;
        gradEl.textContent = GRAD;
        gradEl.style.minWidth = '';
        // reveal dot
        dotEl.textContent = '.';

        // subline
        var subStart = ts + SPEED + 320;
        function subWait(ts2){
          if(ts2 < subStart){ requestAnimationFrame(subWait); return; }
          subEl.style.opacity = '1';
          SUB.split('').forEach(function(ch){
            var s = document.createElement('span');
            s.textContent = ch; s.style.opacity='0';
            subEl.appendChild(s);
          });
          var subSpans = Array.from(subEl.querySelectorAll('span'));
          var si=0, sNext=0;
          function sTick(ts3){
            if(ts3<sNext){requestAnimationFrame(sTick);return;}
            if(si>=subSpans.length){
              setTimeout(function(){
                subEl.style.transition='opacity 2.5s ease';
                subEl.style.opacity='.62';
                setTimeout(run,2500);
              },700);
              return;
            }
            subSpans[si].style.opacity='1';
            sNext=ts3+SPEED+(subSpans[si].textContent===','?COMMA:0);
            si++;
            requestAnimationFrame(sTick);
          }
          requestAnimationFrame(sTick);
        }
        requestAnimationFrame(subWait);
      }
    }
    requestAnimationFrame(gradTick);
  }

  requestAnimationFrame(start);
}

document.fonts.ready.then(function(){ setTimeout(run, 400); });
</script>
</body>
</html>
